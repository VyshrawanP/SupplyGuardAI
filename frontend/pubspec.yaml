name: supplyguard_ai_frontend
description: SupplyGuard AI Flutter command and field operations app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_riverpod: ^3.3.1
  dio: ^5.4.0
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  fl_chart: ^1.2.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_local_notifications: ^21.0.0
  uuid: ^4.2.2
  intl: ^0.20.2
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0
  connectivity_plus: ^7.1.1
  flutter_blue_plus: ^2.2.1
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
